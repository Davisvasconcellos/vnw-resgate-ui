<body class="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<div class="absolute inset-0 z-0 overflow-hidden">
<div class="absolute -top-[10%] -right-[5%] w-[60%] h-[60%] bg-primary-fixed-dim/30 rounded-full blur-[120px]"></div>
<div class="absolute top-[40%] -left-[10%] w-[50%] h-[50%] bg-secondary-fixed/20 rounded-full blur-[100px]"></div>
</div>
<main class="relative z-10 w-full max-w-md">
<header class="text-center mb-10">
<div class="inline-flex items-center justify-center mb-6">
<span class="text-4xl font-extrabold text-primary tracking-tighter font-headline">LimpaJá</span>
</div>
<h1 class="text-3xl font-bold text-on-surface font-headline tracking-tight mb-2">Welcome Back</h1>
<p class="text-on-surface-variant font-body">Sign in to your pristine space concierge.</p>
</header>
<section class="glass-card rounded-lg p-8 shadow-[0_32px_64px_-16px_rgba(0,88,190,0.08)]">
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-highest border-none rounded-md focus:ring-2 focus:ring-primary/20 transition-all duration-200 placeholder:text-outline/60 text-on-surface" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-highest border-none rounded-md focus:ring-2 focus:ring-primary/20 transition-all duration-200 placeholder:text-outline/60 text-on-surface" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-2">
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-[0_12px_24px_-8px_rgba(0,88,190,0.3)] hover:opacity-90 active:scale-[0.98] transition-all duration-200 font-headline text-lg" type="submit">
                        Sign In
                    </button>
</div>
</form>
<div class="mt-8 pt-8 border-t border-outline-variant/10 flex flex-col items-center space-y-6">
<div class="relative w-full text-center">
<span class="bg-white/0 px-4 text-xs font-bold text-outline uppercase tracking-widest relative z-10">Or continue with</span>
</div>
<div class="grid grid-cols-2 gap-4 w-full">
<button class="flex items-center justify-center py-3 px-4 bg-surface-container-high rounded-md hover:bg-surface-container-highest transition-colors active:scale-95 duration-200">
<img alt="Google Logo" class="w-5 h-5 mr-3" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCu7gl0IkeP8KZblVlztXd31TBJC9AIbeZUlRqPyzHFskaNqKZ7iCtbx99MBZUW2AdOCUn0BG9EAgCxtYRHjwXgvsnX4knhvMqMsxe5d7KzDQG-_pNNLZJoAvKARVH-eCS9912DC8VFcCTDCi8R9ANRcTlYdoYSOy3NEOWQJ9TQ0eWabBzgaB-43d1ypdkTSi6SF1fl8EpajN6v82iHxjgTh3zG8MXtjNGbjiQCnsxB58Ygh3HOmtKeTFqQ0MEwDOa7gw76b2JoHQY"/>
<span class="text-sm font-bold text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center py-3 px-4 bg-surface-container-high rounded-md hover:bg-surface-container-highest transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined mr-3 text-on-surface" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="text-sm font-bold text-on-surface">Apple</span>
</button>
</div>
</div>
</section>
<footer class="mt-10 text-center">
<p class="text-on-surface-variant font-medium">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Sign Up</a>
</p>
</footer>
</main>
<div class="fixed bottom-12 right-12 opacity-10 pointer-events-none select-none hidden lg:block">
